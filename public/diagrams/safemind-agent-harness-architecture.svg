<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" role="img" aria-labelledby="title desc"><title id="title">SafeMind Agent Harness Architecture</title><desc id="desc">Governed agent harness architecture with domain pack, control plane, data plane, memory fabric, and observability.</desc><style>.bg{fill:#fff}.title{font:800 30px Inter,Arial,sans-serif;fill:#0f172a}.sub{font:18px Inter,Arial,sans-serif;fill:#475569}.h{font:800 17px Inter,Arial,sans-serif;fill:#0f172a}.t{font:13px Inter,Arial,sans-serif;fill:#475569}.box{fill:#fff;stroke:#334155;stroke-width:2;rx:18}.blue{fill:#eff6ff;stroke:#2563eb}.green{fill:#f0fdf4;stroke:#16a34a}.purple{fill:#faf5ff;stroke:#7c3aed}.amber{fill:#fffbeb;stroke:#d97706}.red{fill:#fff1f2;stroke:#dc2626}.line{stroke:#0f172a;stroke-width:2;fill:none;marker-end:url(#a)}</style><defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#0f172a"/></marker></defs><rect class="bg" width="1440" height="900"/><text x="720" y="52" text-anchor="middle" class="title">SafeMind Agent Harness Architecture</text><text x="720" y="82" text-anchor="middle" class="sub">Governed control plane for production enterprise agents</text><rect x="395" y="115" width="650" height="95" class="box purple"/><text x="720" y="150" text-anchor="middle" class="h">DOMAIN PACK</text><text x="720" y="178" text-anchor="middle" class="t">SOC triage prompts, schemas, tools, playbooks, and domain policies</text><path d="M720 210 L720 250" class="line"/><rect x="190" y="250" width="1060" height="56" class="box purple"/><text x="720" y="285" text-anchor="middle" class="h">CANONICAL INTERFACE — TYPED CONTRACTS</text><path d="M720 306 L720 345" class="line"/><rect x="110" y="345" width="1220" height="325" class="box blue"/><text x="720" y="382" text-anchor="middle" class="h">CONTROL PLANE</text><rect x="250" y="410" width="310" height="82" class="box"/><text x="405" y="443" text-anchor="middle" class="h">Planner / Orchestrator</text><text x="405" y="468" text-anchor="middle" class="t">Generate bounded investigation DAGs</text><rect x="750" y="410" width="310" height="82" class="box red"/><text x="905" y="443" text-anchor="middle" class="h">Policy Engine</text><text x="905" y="468" text-anchor="middle" class="t">Guardrails, eligibility, approvals</text><rect x="250" y="525" width="310" height="82" class="box purple"/><text x="405" y="558" text-anchor="middle" class="h">Memory Router</text><text x="405" y="583" text-anchor="middle" class="t">Retrieve and package context</text><rect x="750" y="525" width="310" height="82" class="box green"/><text x="905" y="558" text-anchor="middle" class="h">Decision / Evaluator</text><text x="905" y="583" text-anchor="middle" class="t">Confidence, stop, continue, escalate</text><rect x="415" y="625" width="470" height="58" class="box"/><text x="650" y="660" text-anchor="middle" class="h">Evidence Synthesizer + Reasoner</text><path d="M560 451 L750 451" class="line"/><path d="M405 492 L405 525" class="line"/><path d="M905 492 L905 525" class="line"/><path d="M560 566 L750 566" class="line"/><path d="M405 607 L515 625" class="line"/><path d="M905 607 L785 625" class="line"/><path d="M720 670 L720 707" class="line"/><rect x="110" y="707" width="1220" height="82" class="box green"/><text x="210" y="745" text-anchor="middle" class="h">DATA PLANE</text><text x="720" y="740" text-anchor="middle" class="h">Stateless Workers</text><text x="720" y="766" text-anchor="middle" class="t">EDR • Identity • Threat Intel • Firewall • Ticketing • Action Workers</text><path d="M720 789 L720 818" class="line"/><rect x="110" y="818" width="1220" height="62" class="box purple"/><text x="210" y="855" text-anchor="middle" class="h">MEMORY</text><text x="720" y="852" text-anchor="middle" class="t">Redis • Aurora • S3 • OpenSearch / Vector DB • Knowledge Store • Feedback</text><rect x="250" y="15" width="0" height="0"/><rect x="300" y="864" width="840" height="30" class="box amber"/><text x="720" y="884" text-anchor="middle" class="t">Observability / Audit / Replay as a cross-cutting layer</text></svg>