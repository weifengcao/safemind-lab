<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="1200" viewBox="0 0 1100 1200"><style>.bg{fill:#fff}.title{font:800 28px Inter,Arial,sans-serif;fill:#0f172a}.t{font:13px Inter,Arial,sans-serif;fill:#475569}.h{font:700 15px Inter,Arial,sans-serif;fill:#0f172a}.box{fill:#fff;stroke:#334155;stroke-width:2;rx:16}.green{fill:#f0fdf4;stroke:#16a34a}.amber{fill:#fffbeb;stroke:#d97706}.red{fill:#fff1f2;stroke:#dc2626}.line{stroke:#0f172a;stroke-width:2;fill:none;marker-end:url(#a)}</style><defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#0f172a"/></marker></defs><rect class="bg" width="1100" height="1200"/><text x="550" y="50" text-anchor="middle" class="title">Stateful Investigation Loop</text><rect x="300" y="110" width="500" height="60" class="box"/><text x="550" y="145" text-anchor="middle" class="h">Alert Ingested</text><path d="M550 170 L550 205" class="line"/><rect x="300" y="205" width="500" height="60" class="box"/><text x="550" y="240" text-anchor="middle" class="h">Preprocess & Normalize</text><path d="M550 265 L550 300" class="line"/><rect x="300" y="300" width="500" height="60" class="box"/><text x="550" y="335" text-anchor="middle" class="h">Context Retrieval</text><path d="M550 360 L550 395" class="line"/><rect x="260" y="395" width="580" height="400" class="box green"/><text x="550" y="425" text-anchor="middle" class="h">Investigation Loop</text><rect x="310" y="440" width="480" height="50" class="box"/><text x="550" y="470" text-anchor="middle" class="t">Planner → DAG</text><rect x="310" y="500" width="480" height="50" class="box"/><text x="550" y="530" text-anchor="middle" class="t">Workers → Evidence</text><rect x="310" y="560" width="480" height="50" class="box"/><text x="550" y="590" text-anchor="middle" class="t">Synthesis → Facts</text><rect x="310" y="620" width="480" height="50" class="box"/><text x="550" y="650" text-anchor="middle" class="t">Reasoner → Hypothesis</