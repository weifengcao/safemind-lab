<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" role="img" aria-label="Stateful SOC investigation loop">
  <rect width="1200" height="900" fill="white"/>
  <text x="600" y="54" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#0f172a">Stateful SOC Investigation Loop</text>
  <text x="600" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#475569">Bounded reasoning with evidence, evaluation, policy, and feedback</text>

  <rect x="70" y="145" width="230" height="80" rx="16" fill="#f8fafc" stroke="#334155" stroke-width="2"/>
  <text x="185" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#0f172a">Alert Ingested</text>
  <text x="185" y="202" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#475569">Raw alert + tenant context</text>

  <line x1="300" y1="185" x2="360" y2="185" stroke="#0f172a" stroke-width="2"/>
  <polygon points="360,185 348,178 348,192" fill="#0f172a"/>

  <rect x="360" y="145" width="250" height="80" rx="16" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="485" y="176" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#0f172a">Preprocessor</text>
  <text x="485" y="201" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#475569">Normalize, deduplicate, enrich</text>

  <line x1="610" y1="185" x2="670" y2="185" stroke="#0f172a" stroke-width="2"/>
  <polygon points="670,185 658,178 658,192" fill="#0f172a"/>

  <rect x="670" y="145" width="250" height="80" rx="16" fill="#faf5ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="795" y="176" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#0f172a">Memory Router</text>
  <text x="795" y="201" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#475569">Build context pack</text>

  <line x1="795" y1="225" x2="795" y2="282" stroke="#0f172a" stroke-width="2"/>
  <polygon points="795,282 788,270 802,270" fill="#0f172a"/>

  <rect x="250" y="282" width="700" height="355" rx="24" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="600" y="322" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#14532d">Bounded Investigation Loop</text>

  <rect x="330" y="355" width="230" height="62" rx="14" fill="white" stroke="#334155" stroke-width="2"/>
  <text x="445" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#0f172a">1. Planner creates DAG</text>

  <rect x="640" y="355" width="230" height="62" rx="14" fill="white" stroke="#334155" stroke-width="2"/>
  <text x="755" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#0f172a">2. Workers collect evidence</text>

  <rect x="640" y="475" width="230" height="62" rx="14" fill="white" stroke="#334155" stroke-width="2"/>
  <text x="755" y="512" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#0f172a">3. Synthesizer builds facts</text>

  <rect x="330" y="475" width="230" height="62" rx="14" fill="white" stroke="#334155" stroke-width="2"/>
  <text x="445" y="512" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#0f172a">4. Reasoner proposes verdict</text>

  <rect x="485" y="562" width="230" height="62" rx="14" fill="#fffbeb" stroke="#d97706" stroke-width="2"/>
  <text x="600" y="599" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#0f172a">5. Evaluator decides</text>

  <line x1="560" y1="386" x2="640" y2="386" stroke="#0f172a" stroke-width="2"/>
  <polygon points="640,386 628,379 628,393" fill="#0f172a"/>
  <line x1="755" y1="417" x2="755" y2="475" stroke="#0f172a" stroke-width="2"/>
  <polygon points="755,475 748,463 762,463" fill="#0f172a"/>
  <line x1="640" y1="506" x2="560" y2="506" stroke="#0f172a" stroke-width="2"/>
  <polygon points="560,506 572,499 572,513" fill="#0f172a"/>
  <line x1="445" y1="537" x2="560" y2="562" stroke="#0f172a" stroke-width="2"/>
  <polygon points="560,562 547,552 544,566" fill="#0f172a"/>

  <path d="M485 593 C250 590 245 385 330 385" fill="none" stroke="#dc2626" stroke-width="2" stroke-dasharray="8 6"/>
  <text x="300" y="575" font-family="Arial, sans-serif" font-size="12" fill="#b91c1c">continue / replan</text>

  <line x1="600" y1="637" x2="600" y2="700" stroke="#0f172a" stroke-width="2"/>
  <polygon points="600,700 593,688 607,688" fill="#0f172a"/>

  <rect x="460" y="700" width="280" height="72" rx="16" fill="#f8fafc" stroke="#334155" stroke-width="2"/>
  <text x="600" y="730" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#0f172a">Final Decision</text>
  <text x="600" y="753" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#475569">confidence + evidence references</text>

  <line x1="740" y1="736" x2="835" y2="736" stroke="#0f172a" stroke-width="2"/>
  <polygon points="835,736 823,729 823,743" fill="#0f172a"/>

  <rect x="835" y="700" width="250" height="72" rx="16" fill="#fff1f2" stroke="#dc2626" stroke-width="2"/>
  <text x="960" y="730" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#0f172a">Policy / Approval</text>
  <text x="960" y="753" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#475569">gate risky actions</text>

  <line x1="600" y1="772" x2="600" y2="820" stroke="#0f172a" stroke-width="2"/>
  <polygon points="600,820 593,808 607,808" fill="#0f172a"/>
  <rect x="450" y="820" width="300" height="52" rx="14" fill="#faf5ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="600" y="852" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#0f172a">Case Closure + Feedback</text>
</svg>
